server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router: все пути → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кеш для ассетов (Vite добавляет хеши в имена)
    location ~* \.(js|css|wasm|png|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
