# ─── Nginx конфигурация для chess.gto-team.uz ──────────────────────────────
# HTTP → HTTPS redirect + WebSocket proxy + статика

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name chess.gto-team.uz www.chess.gto-team.uz;
    return 301 https://$host$request_uri;
}

# HTTPS основной
server {
    listen 443 ssl http2;
    server_name chess.gto-team.uz www.chess.gto-team.uz;

    ssl_certificate     /etc/letsencrypt/live/chess.gto-team.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chess.gto-team.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    # ── API запросы → Django ─────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket для игры → Django Channels ─────────────────
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # держим соединение час
        proxy_send_timeout 3600s;
    }

    # ── Django Admin ─────────────────────────────────────────
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Статика Django ───────────────────────────────────────
    location /static/ {
        proxy_pass http://backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Медиафайлы ───────────────────────────────────────────
    location /media/ {
        alias /media/;
        expires 7d;
    }

    # ── Vue SPA (всё остальное) ───────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }
}
