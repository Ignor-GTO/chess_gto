# ─── Nginx для chess.gto-team.uz (за Traefik / Dokploy) ───────────────────
# Docker DNS: резолвим имена сервисов при каждом запросе (иначе 502 после redeploy).

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    # Встроенный DNS Docker Compose
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    client_max_body_size 10M;

    # ── API → Django ─────────────────────────────────────────
    location /api/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # ── WebSocket → Django Channels ───────────────────────────
    location /ws/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Django Admin (legacy) → /django-admin/ ────────────────
    location /django-admin/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # ── Статика Django ────────────────────────────────────────
    location /static/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Медиафайлы ────────────────────────────────────────────
    location /media/ {
        alias /media/;
        expires 7d;
    }

    # ── Vue SPA (включая /admin — Vue-админка) ────────────────
    location / {
        set $frontend_upstream frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
